name: Build aarch64 Rootfs

on:
  push:
    branches: [main, 'cursor/**']
    paths:
      - 'build/**'
      - 'packages/**'
      - 'os-release'
      - 'VERSION'
      - '.github/workflows/build-rootfs-aarch64.yml'
  workflow_dispatch:

concurrency:
  group: build-aarch64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap xz-utils

      - name: Build aarch64 rootfs
        run: sudo NEXUSOS_CI_MINIMAL=1 ./build/rootfs/build-aarch64.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexusos-aarch64-rootfs
          path: releases/nexusos-aarch64-rootfs.tar.xz
          retention-days: 7
