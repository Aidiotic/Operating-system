name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-kernel:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    # CI-only: aarch64 kernel .deb is not published on GitHub Releases.
    if: false
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev ccache git wget
      - run: |
          chmod +x build/kernel/*.sh
          ASAHI_KERNEL_USE_PREBUILT=1 ./build/kernel/build-asahi-kernel.sh
      - uses: actions/upload-artifact@v4
        with:
          name: asahi-kernel-deb
          path: releases/nexusos-asahi-kernel_*_arm64.deb
          if-no-files-found: warn

  publish-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg
      - name: Publish APT repo
        env:
          NEXUSOS_APT_GPG_PRIVATE_KEY: ${{ secrets.NEXUSOS_APT_GPG_PRIVATE_KEY }}
          NEXUSOS_APT_GPG_KEY_ID: ${{ secrets.NEXUSOS_APT_GPG_KEY_ID }}
          # Unsigned publish is OK until NEXUSOS_APT_GPG_* secrets are configured.
          NEXUSOS_REQUIRE_SIGNED_REPO: "0"
        run: |
          chmod +x build/packages/build-debs.sh build/repo/*.sh
          ./build/repo/publish-repo.sh
      - uses: actions/upload-artifact@v4
        with:
          name: apt-repo
          path: docs/repo/

  build-installer:
    runs-on: ubuntu-latest
    # CI-only: macOS installer tarball is not published on GitHub Releases (see docs/REDISTRIBUTION_POLICY.md).
    if: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: |
          chmod +x installer/*.sh installer/patches/*.sh
          ./installer/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: installer-bundle
          path: installer/releases/

  build-x86_64:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap xz-utils xorriso grub-pc-bin grub-efi-amd64-bin dpkg-dev
      - run: |
          chmod +x build/packages/build-debs.sh build/repo/*.sh
          ./build/packages/build-debs.sh
      - run: sudo env NEXUSOS_CI_MINIMAL=0 ./build/rootfs/build-x86_64.sh
      - run: sudo ./build/iso/build-iso.sh
      - uses: actions/upload-artifact@v4
        with:
          name: x86_64-artifacts
          path: releases/

  build-aarch64:
    runs-on: ubuntu-24.04-arm
    needs: [build-kernel]
    timeout-minutes: 120
    # CI-only: aarch64 rootfs / UTM are not published on GitHub Releases.
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: asahi-kernel-deb
          path: releases/
      - run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap xz-utils dpkg-dev apt-utils
      - run: |
          chmod +x build/packages/build-debs.sh build/kernel/*.sh
          ./build/packages/build-debs.sh
      - run: sudo env NEXUSOS_CI_MINIMAL=0 ASAHI_KERNEL_USE_PREBUILT=0 ./build/rootfs/build-aarch64.sh
      - run: ./build/utm/build-utm.sh
      - uses: actions/upload-artifact@v4
        with:
          name: aarch64-artifacts
          path: releases/

  release:
    needs: [build-x86_64, publish-repo]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release directory (x86_64 only)
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name "nexusos-x86_64-rootfs.tar.xz" -o \
            -name "nexusos-x86_64.iso" \
            \) -exec cp {} release/ \;
          if ! ls release/* 1>/dev/null 2>&1; then
            echo "No x86_64 release artifacts found"
            exit 1
          fi
          cd release && sha256sum * 2>/dev/null > SHA256SUMS || shasum -a 256 * > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body: |
            **x86_64 release artifacts only** (WSL2 / live ISO preview).

            Mac Apple Silicon: git clone the repo and run `./install.sh` — aarch64
            binaries are not redistributed on Releases. See [Redistribution Policy](https://github.com/Aidiotic/Operating-system/blob/main/docs/REDISTRIBUTION_POLICY.md).
          generate_release_notes: true

  deploy-pages:
    needs: [publish-repo]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apt-repo
          path: docs/repo
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/repo
      - id: deployment
        uses: actions/deploy-pages@v4
