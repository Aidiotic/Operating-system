name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap xz-utils xorriso grub-pc-bin grub-efi-amd64-bin
      - run: sudo ./build/rootfs/build-x86_64.sh
      - run: sudo ./build/iso/build-iso.sh || true
      - uses: actions/upload-artifact@v4
        with:
          name: x86_64-artifacts
          path: releases/

  build-aarch64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap xz-utils zip
      - run: sudo ./build/rootfs/build-aarch64.sh
      - run: ./build/utm/build-utm.sh
      - uses: actions/upload-artifact@v4
        with:
          name: aarch64-artifacts
          path: releases/

  release:
    needs: [build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release directory
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.xz" -o -name "*.iso" -o -name "*.utm" \) -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS 2>/dev/null || shasum -a 256 * > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
