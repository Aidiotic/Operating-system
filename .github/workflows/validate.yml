name: Validate Install Scripts

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          find . -name '*.sh' -not -path './installer/upstream/*' | while read -r f; do
            echo "Checking $f"
            shellcheck -e SC1091,SC2034,SC2164 "$f" || true
          done

      - name: Verify install.sh is executable logic
        run: |
          chmod +x install.sh scripts/*.sh build/**/*.sh installer/*.sh packages/*/bin/* 2>/dev/null || true
          bash -n install.sh
          bash -n scripts/detect-platform.sh
          bash -n scripts/common.sh
          ./scripts/detect-platform.sh

      - name: Validate JSON configs
        run: |
          python3 -m json.tool installer/nexusos-installer-data.json > /dev/null
          python3 -m json.tool packages/nexus-store/catalog.json > /dev/null

      - name: Verify os-release
        run: grep -q 'NexusOS' os-release
