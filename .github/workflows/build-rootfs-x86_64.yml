name: Build x86_64 Rootfs

on:
  push:
    branches: [main, 'cursor/**']
    paths:
      - 'build/**'
      - 'packages/**'
      - 'os-release'
      - '.github/workflows/build-rootfs-x86_64.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap xz-utils

      - name: Build x86_64 rootfs
        run: sudo ./build/rootfs/build-x86_64.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexusos-x86_64-rootfs
          path: releases/nexusos-x86_64-rootfs.tar.xz
          retention-days: 7
