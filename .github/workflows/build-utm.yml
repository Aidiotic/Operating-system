name: Build UTM Bundle

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap xz-utils zip qemu-utils

      - name: Build UTM bundle
        run: |
          chmod +x build/rootfs/*.sh build/utm/build-utm.sh build/kernel/*.sh build/packages/*.sh
          sudo env NEXUSOS_CI_MINIMAL=1 ASAHI_KERNEL_USE_PREBUILT=1 ./build/rootfs/build-aarch64.sh
          ./build/utm/build-utm.sh

      - name: Upload UTM bundle
        uses: actions/upload-artifact@v4
        with:
          name: nexusos-aarch64-utm
          path: releases/nexusos-aarch64.utm
          retention-days: 7
