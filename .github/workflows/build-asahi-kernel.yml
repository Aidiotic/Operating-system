name: Build Asahi Kernel

on:
  workflow_dispatch:
  push:
    branches: [main, 'cursor/**']
    paths:
      - 'build/kernel/**'
      - 'VERSION'
    tags:
      - 'v*'

concurrency:
  group: build-asahi-kernel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-kernel:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: asahi-kernel-${{ hashFiles('build/kernel/versions.env', 'build/kernel/asahi.config') }}
          restore-keys: asahi-kernel-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libssl-dev libelf-dev \
            dwarves kmod cpio ccache git wget

      - name: Build or fetch kernel
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            export ASAHI_KERNEL_USE_PREBUILT=1
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            export ASAHI_KERNEL_USE_PREBUILT=0
          else
            export ASAHI_KERNEL_USE_PREBUILT=1
          fi
          chmod +x build/kernel/*.sh
          ./build/kernel/build-asahi-kernel.sh

      - uses: actions/upload-artifact@v4
        with:
          name: nexusos-asahi-kernel
          path: releases/nexusos-asahi-kernel_*_arm64.deb
          if-no-files-found: warn
          retention-days: 14
